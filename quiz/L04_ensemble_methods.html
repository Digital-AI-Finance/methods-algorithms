    <script>
        const quizData = {
            questions: [
                {
                    "id": 1,
                    "question": "When drawing $n$ samples with replacement from $n$ datapoints, what fraction of unique datapoints appear in a bootstrap sample on average?",
                    "options": {
                        "A": "50.0%",
                        "B": "63.2%",
                        "C": "75.0%",
                        "D": "100%"
                    },
                    "correct": "B",
                    "explanation": "Each datapoint has probability $1 - 1/n$ of NOT being picked in one draw. Over $n$ draws: $P(\\text{not picked}) = (1 - 1/n)^n \\to e^{-1} \\approx 0.368$. So the fraction included is $1 - e^{-1} \\approx 0.632$ or 63.2%."
                },
                {
                    "id": 2,
                    "question": "Bagging averages $B$ independent estimators. If each tree has variance $\\sigma^2$, why does the ensemble variance decrease?",
                    "options": {
                        "A": "Averaging always reduces bias, not variance",
                        "B": "Each tree sees the full dataset, so they all agree and variance is zero",
                        "C": "By the law of large numbers, the average of $B$ independent estimators with variance $\\sigma^2$ has variance $\\sigma^2/B$, which shrinks as $B$ grows",
                        "D": "Bagging increases variance but reduces bias, creating a net improvement"
                    },
                    "correct": "C",
                    "explanation": "If trees were truly independent with equal variance $\\sigma^2$, the ensemble variance would be $\\sigma^2/B$. In practice, trees are not fully independent (they share the same training data), so the actual reduction is less. This is why Random Forests add feature randomisation -- to make trees more independent and push variance closer to $\\sigma^2/B$."
                },
                {
                    "id": 3,
                    "question": "Approximately 36.8% of training samples are excluded from each bootstrap sample. How does this create a 'free' validation set (OOB error)?",
                    "options": {
                        "A": "The excluded samples are used to retrain a separate validation model",
                        "B": "The OOB samples are used to prune the trees after training",
                        "C": "OOB error requires a separate holdout set and is not actually free",
                        "D": "For each training sample, predictions are collected only from trees whose bootstrap did NOT include that sample, creating an unbiased estimate without a separate validation split"
                    },
                    "correct": "D",
                    "explanation": "For each sample $x_i$, roughly $B/e$ trees did not include $x_i$ in their bootstrap. We aggregate predictions from only those trees for $x_i$, then compare with the true label. This gives an unbiased error estimate without needing a separate validation split -- hence 'free'. OOB error closely approximates leave-one-out cross-validation."
                },
                {
                    "id": 4,
                    "question": "A Random Forest uses bootstrap sampling AND random feature subsets. If you remove bootstrap but keep feature subsetting (i.e., use 'pasting'), what specific effect does this have on the ensemble?",
                    "options": {
                        "A": "The ensemble becomes identical to a single deep tree since all trees see the same data",
                        "B": "You lose the ability to compute OOB error, and trees become slightly more correlated since every tree trains on all $n$ samples",
                        "C": "Individual tree accuracy drops because each tree sees fewer samples",
                        "D": "The ensemble variance increases dramatically because feature subsetting no longer works without bootstrap"
                    },
                    "correct": "B",
                    "explanation": "Bootstrap provides two benefits: (1) OOB error estimation (the ~36.8% left-out samples per tree), and (2) data diversity between trees. Without bootstrap ('pasting'), every tree trains on the full dataset. Feature subsetting still decorrelates splits, but since all trees see identical rows, they become more correlated (higher $\\rho$). Critically, OOB error estimation is impossible because no samples are left out. Trees still differ due to feature randomisation, so (A) is wrong -- they are not identical."
                },
                {
                    "id": 5,
                    "question": "For a regression problem with 81 features, the default max_features is $p/3 = 27$. A colleague sets max_features$= 81$ (all features) arguing each tree will be more accurate. What happens to tree correlation and ensemble test error?",
                    "options": {
                        "A": "Tree correlation drops and test error improves because each tree is stronger",
                        "B": "Tree correlation is unchanged; only the number of trees $B$ affects correlation",
                        "C": "Tree correlation $\\rho$ increases sharply because all trees pick the same dominant features at each split, and test error likely INCREASES despite each tree being individually more accurate",
                        "D": "The ensemble becomes equivalent to a single tree, so test error equals single-tree error"
                    },
                    "correct": "C",
                    "explanation": "When every tree considers all 81 features, the same strong predictors dominate splits in every tree, making them highly correlated ($\\rho \\to 1$). From the variance formula $\\text{Var}(\\bar{f}) = \\rho\\sigma^2 + \\frac{1-\\rho}{B}\\sigma^2$, high $\\rho$ raises the irreducible variance floor. Each tree individually has lower bias, but the ensemble loses its variance-reduction benefit. This is the core RF tradeoff: slightly weaker individual trees (higher bias) but much lower correlation yield a better ensemble."
                },
                {
                    "id": 6,
                    "question": "Using the variance formula $\\text{Var}(\\bar{f}) = \\rho\\sigma^2 + \\frac{1-\\rho}{B}\\sigma^2$, what is the MINIMUM number of trees $B$ so the second term contributes less than 1% of the first term? Assume $\\rho = 0.3$. (Solve: $\\frac{1-\\rho}{B} < 0.01 \\cdot \\rho$)",
                    "options": {
                        "A": "$B > 70$, so $B = 71$ trees minimum",
                        "B": "$B > 100$, so $B = 101$ trees minimum",
                        "C": "$B > 150$, so $B = 151$ trees minimum",
                        "D": "$B > 233$, so $B = 234$ trees minimum"
                    },
                    "correct": "D",
                    "explanation": "We need $\\frac{1-\\rho}{B} < 0.01 \\cdot \\rho$, i.e., $\\frac{0.7}{B} < 0.01 \\times 0.3 = 0.003$. Rearranging: $B > \\frac{0.7}{0.003} = 233.\\overline{3}$. So $B \\geq 234$ trees. At this point the reducible term ($\\frac{0.7}{234}\\sigma^2 \\approx 0.003\\sigma^2$) is negligible compared to the correlation floor ($0.3\\sigma^2$). Adding trees beyond 234 yields virtually no improvement -- you must reduce $\\rho$ instead."
                },
                {
                    "id": 7,
                    "question": "You plot OOB error vs. max_features for values 1, 5, 10, 20, 50, 100 on a classification dataset with $p = 100$ features. Where does the OOB error curve typically reach its minimum, and why?",
                    "options": {
                        "A": "Around $\\sqrt{p} = 10$: below this, individual trees are too weak (high bias); above this, trees become too correlated (high ensemble variance)",
                        "B": "At max_features $= 1$: maximum decorrelation always wins regardless of individual tree quality",
                        "C": "At max_features $= 100$: each tree is as accurate as possible, so the ensemble must also be optimal",
                        "D": "At max_features $= 50$: the midpoint always minimises OOB error for any dataset"
                    },
                    "correct": "A",
                    "explanation": "The OOB error curve is typically U-shaped. At very low max_features (e.g., 1), each tree is almost random (high bias) and the ensemble cannot compensate. At very high max_features (e.g., 100), all trees pick the same dominant splits (high $\\rho$), collapsing ensemble variance reduction. The minimum is usually near $\\sqrt{p}$ for classification (here, 10), balancing the bias-correlation tradeoff. This is why $\\sqrt{p}$ is sklearn's default."
                },
                {
                    "id": 8,
                    "question": "A Random Forest has $\\rho = 0.5$. Explain why increasing from $B=100$ to $B=1000$ trees barely improves performance.",
                    "options": {
                        "A": "Because more trees always cause overfitting",
                        "B": "Because 100 trees is always the optimal number for any dataset",
                        "C": "Because the variance floor $\\rho\\sigma^2 = 0.5\\sigma^2$ dominates; the reducible term drops from $0.005\\sigma^2$ to $0.0005\\sigma^2$, a negligible improvement",
                        "D": "Because the OOB error increases with more trees"
                    },
                    "correct": "C",
                    "explanation": "At $B=100$: Var $= 0.5\\sigma^2 + \\frac{0.5}{100}\\sigma^2 = 0.505\\sigma^2$. At $B=1000$: Var $= 0.5\\sigma^2 + \\frac{0.5}{1000}\\sigma^2 = 0.5005\\sigma^2$. The improvement is only $0.0045\\sigma^2$ -- negligible. The $\\rho\\sigma^2$ floor cannot be reduced by adding trees. To meaningfully improve, you must reduce $\\rho$ (lower max_features)."
                },
                {
                    "id": 9,
                    "question": "The RF algorithm has three key steps: (1) draw bootstrap sample, (2) grow tree with random feature subset at each split, (3) repeat B times and aggregate. Which step is primarily responsible for creating tree diversity?",
                    "options": {
                        "A": "Step 1 only -- bootstrap sampling creates all the diversity needed",
                        "B": "Step 3 -- aggregation creates diversity by combining predictions",
                        "C": "Steps 1 AND 2 together -- bootstrap varies the data, feature subsetting varies the structure, and both contribute to decorrelation",
                        "D": "Step 2 only -- feature subsetting is the sole source of diversity"
                    },
                    "correct": "C",
                    "explanation": "Both steps contribute: bootstrap sampling (step 1) ensures different training sets, and feature subsetting (step 2) ensures different split choices even on similar data. Breiman showed that feature randomisation is the more important source of decorrelation, but bootstrap also helps. Step 3 (aggregation) does not create diversity -- it exploits the diversity created by steps 1 and 2."
                },
                {
                    "id": 10,
                    "question": "Two features in your RF model are highly correlated ($r = 0.95$): 'total_debt' and 'monthly_payments'. Permutation importance shows both near zero, but removing either one makes the other's importance jump significantly. What explains this, and how should you measure their joint contribution?",
                    "options": {
                        "A": "The features cancel each other out in the model; neither is actually useful and both should be removed",
                        "B": "Correlated features dilute each other's permutation importance because shuffling one still leaves the correlated partner intact, preserving most predictive information. Use conditional permutation importance or drop-column importance to measure their joint effect.",
                        "C": "Permutation importance is simply unreliable for continuous features; switch to MDI instead",
                        "D": "The model needs more trees to stabilise the importance estimates for correlated features"
                    },
                    "correct": "B",
                    "explanation": "When two features carry nearly identical information ($r = 0.95$), shuffling 'total_debt' barely hurts predictions because 'monthly_payments' still provides the same signal -- and vice versa. Both appear unimportant individually, but the pair is highly important jointly. Conditional permutation importance (shuffle one feature conditional on the other) or drop-column importance (retrain without the feature) correctly reveals their true contribution. This is a well-known limitation of standard permutation importance with correlated features."
                },
                {
                    "id": 11,
                    "question": "SHAP values satisfy the additivity property: they sum to $f(x) - E[f(x)]$. A model predicts $\\hat{y} = 0.85$ for a loan applicant and the base rate (average prediction) is $E[f(x)] = 0.40$. What must the SHAP values across all features sum to?",
                    "options": {
                        "A": "0.85",
                        "B": "0.40",
                        "C": "0.45",
                        "D": "1.25"
                    },
                    "correct": "C",
                    "explanation": "$\\sum_j \\phi_j = f(x) - E[f(x)] = 0.85 - 0.40 = 0.45$. This is the SHAP efficiency axiom: the feature contributions must fully account for the difference between the individual prediction and the average prediction. Each $\\phi_j$ shows how much feature $j$ pushed the prediction above or below the baseline."
                },
                {
                    "id": 12,
                    "question": "In AdaBoost, a weak learner achieves error rate $\\epsilon = 0.25$. What is the learner weight $\\alpha = \\frac{1}{2}\\ln\\frac{1-\\epsilon}{\\epsilon}$?",
                    "options": {
                        "A": "$\\frac{1}{2}\\ln 2 \\approx 0.347$",
                        "B": "$\\frac{1}{2}\\ln 3 \\approx 0.549$",
                        "C": "$\\ln 3 \\approx 1.099$",
                        "D": "$\\frac{1}{2}\\ln 4 \\approx 0.693$"
                    },
                    "correct": "B",
                    "explanation": "$\\alpha = \\frac{1}{2}\\ln\\frac{1 - 0.25}{0.25} = \\frac{1}{2}\\ln\\frac{0.75}{0.25} = \\frac{1}{2}\\ln 3 \\approx \\frac{1}{2}(1.0986) \\approx 0.549$. Higher $\\alpha$ means the learner gets more vote in the final ensemble. A learner with $\\epsilon = 0.5$ (random guessing) gets $\\alpha = 0$."
                },
                {
                    "id": 13,
                    "question": "In AdaBoost, a misclassified sample's weight is multiplied by $e^{\\alpha}$. With $\\alpha = 0.549$ from the previous question, by what factor does the weight increase?",
                    "options": {
                        "A": "$e^{0.549} \\approx 1.73$",
                        "B": "$e^{0.549} \\approx 2.00$",
                        "C": "$e^{0.549} \\approx 1.50$",
                        "D": "$e^{0.549} \\approx 3.00$"
                    },
                    "correct": "A",
                    "explanation": "$e^{0.549} = e^{\\frac{1}{2}\\ln 3} = (e^{\\ln 3})^{1/2} = 3^{1/2} = \\sqrt{3} \\approx 1.732$. Misclassified samples get their weights multiplied by $\\sqrt{3}$, making them roughly 73% more important in the next round. This forces the next weak learner to focus on the mistakes."
                },
                {
                    "id": 14,
                    "question": "In gradient boosting, trees are fit to 'pseudo-residuals.' What are these and why does this work?",
                    "options": {
                        "A": "Pseudo-residuals are the original target values; fitting to them reduces bias",
                        "B": "Pseudo-residuals are random perturbations added to prevent overfitting",
                        "C": "Pseudo-residuals are the negative gradients of the loss function; fitting trees to them performs gradient descent in function space, iteratively reducing the loss",
                        "D": "Pseudo-residuals are the feature importances from the previous tree"
                    },
                    "correct": "C",
                    "explanation": "For squared error loss, pseudo-residuals equal actual residuals ($y_i - \\hat{y}_i$). For general losses, they are $-\\frac{\\partial L}{\\partial \\hat{y}_i}$. Each new tree fits these gradients, moving the ensemble prediction in the direction that most reduces the loss. This is gradient descent where the 'parameter' being optimised is the function itself."
                },
                {
                    "id": 15,
                    "question": "XGBoost's objective includes a regularisation term $\\Omega(f) = \\gamma T + \\frac{1}{2}\\lambda\\sum_{j=1}^T w_j^2$. What do $\\gamma$ and $\\lambda$ control?",
                    "options": {
                        "A": "$\\gamma$ penalises the number of leaves $T$ (tree complexity), $\\lambda$ penalises the magnitude of leaf weights $w_j$ (prediction smoothness)",
                        "B": "$\\gamma$ controls the learning rate, $\\lambda$ controls the number of trees",
                        "C": "$\\gamma$ controls feature sampling, $\\lambda$ controls row sampling",
                        "D": "Both $\\gamma$ and $\\lambda$ control the same thing: overall shrinkage"
                    },
                    "correct": "A",
                    "explanation": "$\\gamma T$ adds a cost per leaf, discouraging trees with many leaves (simpler trees preferred). $\\frac{1}{2}\\lambda\\sum w_j^2$ is L2 regularisation on leaf weights, preventing extreme predictions. Together they control the bias-variance tradeoff: higher $\\gamma$ and $\\lambda$ produce simpler, more regularised trees."
                },
                {
                    "id": 16,
                    "question": "XGBoost evaluates splits using: $\\text{Gain} = \\frac{1}{2}\\left[\\frac{G_L^2}{H_L+\\lambda} + \\frac{G_R^2}{H_R+\\lambda} - \\frac{(G_L+G_R)^2}{H_L+H_R+\\lambda}\\right] - \\gamma$. If the computed Gain is negative, what should happen?",
                    "options": {
                        "A": "Split anyway; negative gain recovers in later iterations",
                        "B": "Do not split -- the regularisation penalty ($\\gamma$) outweighs the impurity improvement, so the node should remain a leaf",
                        "C": "Double the learning rate to compensate",
                        "D": "Reverse the split direction (swap left and right children)"
                    },
                    "correct": "B",
                    "explanation": "A negative Gain means the improvement from splitting ($\\frac{1}{2}[\\cdots]$) is less than the complexity penalty ($\\gamma$). XGBoost prunes this split, keeping the node as a leaf. This is built-in regularisation: $\\gamma$ acts as a minimum gain threshold. Higher $\\gamma$ means fewer splits and simpler trees."
                },
                {
                    "id": 17,
                    "question": "Bagging (Random Forest) primarily reduces variance while boosting (AdaBoost/GBM) primarily reduces bias. Which ensemble method is more prone to overfitting and why?",
                    "options": {
                        "A": "Bagging, because averaging many trees amplifies noise in the training data",
                        "B": "Neither can overfit; both are inherently regularised",
                        "C": "Both overfit equally; the distinction between bias and variance reduction is irrelevant",
                        "D": "Boosting, because each iteration specifically targets previous mistakes, which can include fitting noise in the training data"
                    },
                    "correct": "D",
                    "explanation": "Boosting builds trees sequentially, with each tree correcting errors of the previous ensemble. If training continues too long, the model starts correcting noise rather than signal, leading to overfitting. Bagging (RF) trains trees independently and averages them -- this inherently reduces variance and is much more resistant to overfitting. Adding more trees to an RF never hurts, but adding more boosting rounds can."
                },
                {
                    "id": 18,
                    "question": "Your RF has n_estimators=100, max_depth=None, min_samples_leaf=1. You switch to n_estimators=500 and max_depth=15. Training accuracy drops from 100% to 94% but test accuracy increases from 82% to 89%. Why did limiting individual tree accuracy IMPROVE the ensemble?",
                    "options": {
                        "A": "More trees always improve accuracy regardless of other settings; max_depth had no effect",
                        "B": "The improvement is random noise; 94% training accuracy means the model is now underfitting",
                        "C": "Shallower trees are faster to train, and the speed improvement indirectly improves accuracy",
                        "D": "Shallower trees have higher bias but lower variance; the ensemble averages out the bias while benefiting from lower variance, so regularised trees generalise better collectively"
                    },
                    "correct": "D",
                    "explanation": "With max_depth=None, each tree memorises training data (100% train accuracy) but has high variance -- small data changes produce very different trees. Setting max_depth=15 introduces bias (94% train accuracy) but dramatically reduces each tree's variance. When the ensemble averages 500 such trees, the individual biases partially cancel while the low variance yields stable predictions. The net effect: test accuracy jumps from 82% to 89%. This is the bias-variance tradeoff at the ensemble level -- slightly biased trees make a much better forest."
                },
                {
                    "id": 19,
                    "question": "A team applies class_weight='balanced' to their RF and achieves 78% recall on the fraud class, but precision is only 12%. A stakeholder asks why so many legitimate transactions are flagged. Explain the tradeoff and name two approaches to improve precision while maintaining reasonable recall.",
                    "options": {
                        "A": "Threshold tuning (raise the probability threshold above 0.5) and cost-sensitive learning (set custom sample_weight reflecting business cost ratios) -- both shift the precision-recall tradeoff toward fewer false positives",
                        "B": "Add more trees to the ensemble and increase max_depth -- larger models always improve both precision and recall simultaneously",
                        "C": "Remove class_weight='balanced' entirely and rely on accuracy as the sole metric",
                        "D": "Apply SMOTE to the test set so that precision is computed on balanced classes"
                    },
                    "correct": "A",
                    "explanation": "class_weight='balanced' upweights the minority class, boosting recall at the expense of precision (many false positives). Two principled fixes: (1) Threshold tuning: RF outputs probabilities; raising the decision threshold from 0.5 to, say, 0.7 requires stronger evidence before flagging fraud, reducing false positives. (2) Cost-sensitive sample_weight: instead of the automatic 'balanced' weighting, assign weights reflecting the actual business cost ratio (e.g., missing fraud costs 50x a false alarm). This gives finer control than the blanket 'balanced' setting. Removing class_weight entirely (C) reverts to ignoring the minority class. Applying SMOTE to the test set (D) is data leakage."
                },
                {
                    "id": 20,
                    "question": "A Random Forest is trained on house prices ranging from $100k to $500k. A new house with features unlike any training example is presented. Why can't the RF predict $600k even if the true price is $600k?",
                    "options": {
                        "A": "Random Forests can extrapolate if given enough trees",
                        "B": "Predictions are averages of leaf node values from training data, so the maximum possible prediction is bounded by the highest training value ($500k)",
                        "C": "The RF will automatically detect the out-of-range case and refuse to predict",
                        "D": "Feature scaling would fix this extrapolation problem"
                    },
                    "correct": "B",
                    "explanation": "Each tree routes the new house to a leaf containing training samples. The leaf prediction is the mean (regression) of those training values, all between $100k-$500k. Averaging across trees still gives a value within this range. No combination of averages of numbers in [$100k, $500k$] can produce $600k. This is a fundamental limitation of all tree-based methods compared to linear models which can extrapolate."
                }
            ]
        };

        const state = {
            currentIndex: 0,
            answers: {},
            score: 0,
            displayedQuestions: [],
            pendingSlots: []
        };

        const questionsRow = document.getElementById('questionsRow');
        const progressBar = document.getElementById('progressBar');
        const progressBadge = document.getElementById('progressBadge');
        const scoreBadge = document.getElementById('scoreBadge');
        const resultsCard = document.getElementById('resultsCard');
        const nextBtn = document.getElementById('nextBtn');

        function initQuiz() {
            state.currentIndex = 0;
            state.answers = {};
            state.score = 0;
            state.displayedQuestions = [];
            state.pendingSlots = [];

            resultsCard.classList.remove('show');
            questionsRow.style.display = 'grid';
            nextBtn.classList.remove('show');

            // Show first 3 questions
            for (let i = 0; i < 3 && i < quizData.questions.length; i++) {
                state.displayedQuestions.push(i);
            }
            state.currentIndex = Math.min(3, quizData.questions.length);

            renderQuestions();
            updateStats();
        }

        function renderQuestions() {
            questionsRow.innerHTML = '';

            state.displayedQuestions.forEach((qIdx, slot) => {
                const q = quizData.questions[qIdx];
                const answered = state.answers[q.id] !== undefined;
                const isCorrect = answered && state.answers[q.id] === q.correct;
                const isIncorrect = answered && state.answers[q.id] !== q.correct;

                const card = document.createElement('div');
                card.className = 'question-card';
                if (isCorrect) card.classList.add('correct-card', 'answered');
                if (isIncorrect) card.classList.add('incorrect-card', 'answered');

                card.innerHTML = `
                    <div class="q-header">
                        <span class="q-number">Q${qIdx + 1}</span>
                        ${answered ? `<span class="q-status">${isCorrect ? '&#10004;' : '&#10008;'}</span>` : ''}
                    </div>
                    <div class="q-text">${q.question}</div>
                    <div class="options" data-qid="${q.id}" data-slot="${slot}">
                        ${['A','B','C','D'].map(letter => {
                            let optClass = 'option-btn';
                            if (answered) {
                                optClass += ' disabled';
                                if (letter === q.correct) optClass += ' correct';
                                else if (letter === state.answers[q.id]) optClass += ' incorrect';
                            }
                            return `
                                <button class="${optClass}" data-letter="${letter}" ${answered ? 'disabled' : ''}>
                                    <span class="option-letter">${letter}</span>
                                    <span class="option-text">${q.options[letter]}</span>
                                </button>
                            `;
                        }).join('')}
                    </div>
                    <div class="feedback ${answered ? 'show' : ''} ${isCorrect ? 'correct' : 'incorrect'}">
                        ${answered ? (isCorrect ? '&#10004; ' : `&#10008; Answer: ${q.correct}. `) + q.explanation : ''}
                    </div>
                `;

                // Add click handlers
                if (!answered) {
                    card.querySelectorAll('.option-btn').forEach(btn => {
                        btn.addEventListener('click', () => handleAnswer(qIdx, slot, btn.dataset.letter));
                    });
                }

                questionsRow.appendChild(card);
            });

            renderMath();
        }

        function handleAnswer(qIdx, slot, letter) {
            const q = quizData.questions[qIdx];
            state.answers[q.id] = letter;

            if (letter === q.correct) state.score++;

            // Track this slot as pending replacement
            if (!state.pendingSlots.includes(slot)) {
                state.pendingSlots.push(slot);
            }

            updateStats();
            renderQuestions();

            // Check if all questions answered
            const answered = Object.keys(state.answers).length;
            if (answered >= quizData.questions.length) {
                // Short delay then show results
                setTimeout(showResults, 800);
            } else if (state.currentIndex < quizData.questions.length && state.pendingSlots.length > 0) {
                // Show Next button if there are more questions and pending slots
                nextBtn.classList.add('show');
            }
        }

        function loadNextQuestions() {
            // Replace pending slots with new questions
            while (state.pendingSlots.length > 0 && state.currentIndex < quizData.questions.length) {
                const slot = state.pendingSlots.shift();
                state.displayedQuestions[slot] = state.currentIndex;
                state.currentIndex++;
            }

            // Hide Next button
            nextBtn.classList.remove('show');

            renderQuestions();

            // Check if quiz is complete (all displayed questions answered)
            const answered = Object.keys(state.answers).length;
            if (answered >= quizData.questions.length) {
                setTimeout(showResults, 500);
            }
        }

        function updateStats() {
            const answered = Object.keys(state.answers).length;
            const total = quizData.questions.length;

            progressBar.style.width = `${(answered / total) * 100}%`;
            progressBadge.textContent = `${answered}/${total}`;
            scoreBadge.textContent = `Score: ${state.score}`;
        }

        function showResults() {
            questionsRow.style.display = 'none';
            nextBtn.classList.remove('show');
            resultsCard.classList.add('show');

            const total = quizData.questions.length;
            const percentage = Math.round((state.score / total) * 100);

            document.getElementById('resultsScore').textContent = `${state.score}/${total}`;

            let grade, gradeClass, icon;
            if (percentage >= 90) { grade = 'Excellent! A'; gradeClass = 'grade-a'; icon = '&#127942;'; }
            else if (percentage >= 80) { grade = 'Great! B'; gradeClass = 'grade-b'; icon = '&#11088;'; }
            else if (percentage >= 70) { grade = 'Good! C'; gradeClass = 'grade-c'; icon = '&#128077;'; }
            else if (percentage >= 60) { grade = 'Pass - D'; gradeClass = 'grade-d'; icon = '&#128221;'; }
            else { grade = 'Keep practicing'; gradeClass = 'grade-f'; icon = '&#128218;'; }

            document.getElementById('resultsIcon').innerHTML = icon;
            const gradeEl = document.getElementById('resultsGrade');
            gradeEl.textContent = `${grade} (${percentage}%)`;
            gradeEl.className = `results-grade ${gradeClass}`;
        }

        function restartQuiz() {
            initQuiz();
        }

        function renderMath() {
            if (typeof renderMathInElement !== 'undefined') {
                const opts = {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                };
                // Render only quiz content elements — avoids cross-element
                // delimiter pairing when renderMathInElement scans document.body
                document.querySelectorAll('.q-text, .option-text, .feedback').forEach(el => {
                    renderMathInElement(el, opts);
                });
            }
        }

        function waitForKaTeX(callback, maxAttempts = 50) {
    let attempts = 0;
    function check() {
        if (typeof renderMathInElement !== 'undefined') {
            callback();
        } else if (attempts < maxAttempts) {
            attempts++;
            setTimeout(check, 50);
        }
    }
    check();
}

// Initialize with error handling
        try {
            initQuiz();
            waitForKaTeX(renderMath);
        } catch (e) {
            console.error('Quiz initialization error:', e);
            const container = document.getElementById('questionsRow') || document.querySelector('.main');
            if (container) {
                container.innerHTML =
                    '<div style="padding:2rem;text-align:center;color:#991b1b;">' +
                    '<h3>Quiz failed to load</h3><p>Error: ' + e.message + '</p>' +
                    '<p>Please refresh the page or try a different browser.</p></div>';
            }
        }
    </script>
</body>
</html>
