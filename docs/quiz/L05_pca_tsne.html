        @media (max-width: 600px) {
            .questions-row { grid-template-columns: 1fr; }

    <script>
        const quizData = {
            questions: [
                {
                    "id": 1,
                    "question": "What does PCA maximize when finding principal components?",
                    "options": {
                        "A": "Covariance between components",
                        "B": "Variance of the data projected onto each component",
                        "C": "Number of features retained",
                        "D": "Distance between all data points"
                    },
                    "correct": "B",
                    "explanation": "PCA finds orthogonal directions that maximize the variance of the projected data. PC1 captures the most variance, PC2 captures the most remaining variance perpendicular to PC1, and so on."
                },
                {
                    "id": 2,
                    "question": "The sample covariance matrix for centered data $\\mathbf{X}$ with $n$ samples and $p$ features is:",
                    "options": {
                        "A": "$\\Sigma = \\frac{1}{n-1}\\mathbf{X}^\\top\\mathbf{X}$, a $p \\times p$ matrix",
                        "B": "$\\Sigma = \\mathbf{X}\\mathbf{X}^\\top$, an $n \\times n$ matrix",
                        "C": "$\\Sigma = \\frac{1}{n}\\mathbf{X}$, a $n \\times p$ matrix",
                        "D": "$\\Sigma = \\mathbf{X} + \\mathbf{X}^\\top$"
                    },
                    "correct": "A",
                    "explanation": "$\\Sigma = \\frac{1}{n-1}\\mathbf{X}^\\top\\mathbf{X}$ produces a $p \\times p$ symmetric matrix where entry $(i,j)$ is the covariance between features $i$ and $j$. The diagonal entries are feature variances."
                },
                {
                    "id": 3,
                    "question": "PCA solves $\\Sigma \\mathbf{v} = \\lambda \\mathbf{v}$. What do the eigenvectors $\\mathbf{v}$ and eigenvalues $\\lambda$ represent?",
                    "options": {
                        "A": "Eigenvectors are principal component directions; eigenvalues are the variance captured by each",
                        "B": "Eigenvectors are data points; eigenvalues are distances",
                        "C": "Eigenvectors are eigenvalues sorted; eigenvalues are eigenvectors unsorted",
                        "D": "Both represent the original feature correlations"
                    },
                    "correct": "A",
                    "explanation": "Eigenvectors define the directions (principal components) in feature space along which data varies most. Eigenvalues $\\lambda_i$ quantify how much variance each direction captures. Larger $\\lambda_i$ = more important component."
                },
                {
                    "id": 4,
                    "question": "Eigenvalues of a covariance matrix from 8 financial features are: $\\lambda = [4.5, 2.1, 1.2, 0.8, 0.6, 0.4, 0.3, 0.1]$. What is the explained variance ratio of PC1?",
                    "options": {
                        "A": "$\\frac{4.5}{10} = 45\\%$",
                        "B": "$\\frac{4.5}{4.5+2.1} = 68\\%$",
                        "C": "$\\frac{4.5}{8} = 56\\%$",
                        "D": "$4.5\\%$"
                    },
                    "correct": "A",
                    "explanation": "Total variance = $4.5+2.1+1.2+0.8+0.6+0.4+0.3+0.1 = 10$. Explained variance ratio for PC1 = $\\frac{\\lambda_1}{\\sum\\lambda_i} = \\frac{4.5}{10} = 0.45 = 45\\%$. PC1 alone captures 45% of total variance."
                },
                {
                    "id": 5,
                    "question": "Using the same eigenvalues $[4.5, 2.1, 1.2, 0.8, 0.6, 0.4, 0.3, 0.1]$, how many components do you need to explain at least 80% of variance?",
                    "options": {
                        "A": "1 component (45%)",
                        "B": "2 components (45% + 21% = 66%)",
                        "C": "3 components (45% + 21% + 12% = 78%)",
                        "D": "4 components (45% + 21% + 12% + 8% = 86%)"
                    },
                    "correct": "D",
                    "explanation": "Cumulative: PC1=45%, PC1+2=66%, PC1+2+3=78%, PC1+2+3+4=86%. You need 4 components to exceed the 80% threshold, reducing from 8 to 4 dimensions while retaining 86% of the information."
                },
                {
                    "id": 6,
                    "question": "The Kaiser criterion states: retain components with eigenvalue $\\lambda > 1$ when using standardized data. Why is $\\lambda = 1$ the threshold?",
                    "options": {
                        "A": "Because 1 is the average eigenvalue when each standardized variable has variance 1, so $\\lambda > 1$ captures more than one variable's worth of variance",
                        "B": "Because eigenvalues below 1 are negative",
                        "C": "Because 1 is an arbitrary convention with no justification",
                        "D": "Because the total variance always equals 1"
                    },
                    "correct": "A",
                    "explanation": "With standardized data, each variable has variance 1 and total variance = $p$. The average eigenvalue is $p/p = 1$. A component with $\\lambda > 1$ explains more variance than a single original variable, so it is worth keeping."
                },
                {
                    "id": 7,
                    "question": "Why must data be centered (mean subtracted) before applying PCA?",
                    "options": {
                        "A": "Centering is optional; PCA works the same with or without it",
                        "B": "Without centering, PC1 points toward the data mean instead of the direction of maximum variance",
                        "C": "Centering makes all eigenvalues positive",
                        "D": "Centering reduces computational cost"
                    },
                    "correct": "B",
                    "explanation": "PCA maximizes projected variance. If data is not centered, the mean contributes a large 'trivial' variance component. Centering ensures PC1 captures the direction of maximum data spread, not just where the data is located."
                },
                {
                    "id": 8,
                    "question": "PCA reconstruction error when using $k$ of $p$ components equals the sum of discarded eigenvalues: $\\sum_{i=k+1}^{p} \\lambda_i$. With eigenvalues $[5, 3, 1.5, 0.5]$ and $k=2$, what is the reconstruction error?",
                    "options": {
                        "A": "$1.5 + 0.5 = 2.0$",
                        "B": "$5 + 3 = 8.0$",
                        "C": "$\\frac{2.0}{10} = 0.2$",
                        "D": "$10 - 2 = 8.0$"
                    },
                    "correct": "A",
                    "explanation": "Discarded components are $\\lambda_3 = 1.5$ and $\\lambda_4 = 0.5$, so reconstruction error = $1.5 + 0.5 = 2.0$. As a fraction of total variance ($5+3+1.5+0.5=10$), this is $2/10 = 20\\%$ information lost."
                },
                {
                    "id": 9,
                    "question": "What is a fundamental limitation of PCA as a dimensionality reduction method?",
                    "options": {
                        "A": "PCA only captures linear relationships; non-linear structures (Swiss roll) cannot be unfolded",
                        "B": "PCA requires labeled data",
                        "C": "PCA cannot handle more than 10 features",
                        "D": "PCA always reduces to exactly 2 dimensions"
                    },
                    "correct": "A",
                    "explanation": "PCA finds linear combinations of features. A Swiss roll is a 2D manifold curved in 3D -- PCA projects linearly, overlapping distant parts. Non-linear methods (t-SNE, UMAP) preserve the intrinsic manifold geometry."
                },
                {
                    "id": 10,
                    "question": "In portfolio risk analysis, PCA applied to the covariance matrix of 50 stock returns typically shows PC1 explaining 40-60% of variance. What does PC1 represent?",
                    "options": {
                        "A": "The highest-returning individual stock",
                        "B": "The market factor -- the common systematic risk driving correlated asset movements",
                        "C": "The risk-free interest rate",
                        "D": "Individual stock-specific (idiosyncratic) risk"
                    },
                    "correct": "B",
                    "explanation": "PC1 captures the largest common variance source: the overall market movement. When the market rises, most stocks rise together. PC2 might capture a sector effect (tech vs. energy). PC3 could be interest rate sensitivity. These are systematic risk factors."
                },
                {
                    "id": 11,
                    "question": "A bond trader applies PCA to the yield curve (2y, 5y, 10y, 30y maturities). PC1 typically captures 95% of variance and represents a parallel shift. What does PC2 typically represent?",
                    "options": {
                        "A": "A parallel shift of the entire yield curve",
                        "B": "A twist/slope change (short rates up, long rates down or vice versa)",
                        "C": "Random noise with no interpretation",
                        "D": "The credit spread between government and corporate bonds"
                    },
                    "correct": "B",
                    "explanation": "In yield curve PCA: PC1 = level (parallel shift, ~95% variance), PC2 = slope/twist (~3-4%), PC3 = curvature/butterfly (~1%). PC2 captures scenarios like the Fed raising short rates while long rates fall (yield curve flattening)."
                },
                {
                    "id": 12,
                    "question": "What does t-SNE preserve when reducing high-dimensional data to 2D?",
                    "options": {
                        "A": "Total variance of the data (like PCA)",
                        "B": "Local pairwise similarity structure (neighborhood relationships)",
                        "C": "Exact Euclidean distances between all points",
                        "D": "Linear feature correlations"
                    },
                    "correct": "B",
                    "explanation": "t-SNE converts pairwise distances to probability distributions (Gaussian in high-dim, Student-t in low-dim) and minimizes the KL divergence between them. This preserves local neighborhoods: nearby points in high-dim stay nearby in 2D."
                },
                {
                    "id": 13,
                    "question": "t-SNE minimizes $KL(P\\|Q) = \\sum_{ij} p_{ij} \\log\\frac{p_{ij}}{q_{ij}}$. What do $P$ and $Q$ represent?",
                    "options": {
                        "A": "$P$: high-dimensional pairwise similarities; $Q$: low-dimensional pairwise similarities",
                        "B": "$P$: class probabilities; $Q$: predicted probabilities",
                        "C": "$P$: eigenvalues; $Q$: eigenvectors",
                        "D": "$P$ and $Q$ are both covariance matrices"
                    },
                    "correct": "A",
                    "explanation": "$p_{ij}$ measures how similar points $i$ and $j$ are in the original high-dimensional space (using Gaussian kernels). $q_{ij}$ measures their similarity in the low-dimensional embedding (using Student-t distribution). KL divergence penalizes mismatches."
                },
                {
                    "id": 14,
                    "question": "The perplexity parameter in t-SNE (typical range: 5-50) controls:",
                    "options": {
                        "A": "The number of output dimensions",
                        "B": "The effective number of neighbors each point considers when computing similarities",
                        "C": "The learning rate for gradient descent",
                        "D": "The total number of iterations"
                    },
                    "correct": "B",
                    "explanation": "Perplexity $\\approx 2^{H(P_i)}$ where $H$ is entropy. Perplexity 30 means each point effectively considers about 30 neighbors. Low perplexity (5) emphasizes very local structure; high perplexity (50) captures more global relationships."
                },
                {
                    "id": 15,
                    "question": "Why does t-SNE use a Student-t distribution (heavy tails) in the low-dimensional space instead of a Gaussian?",
                    "options": {
                        "A": "The t-distribution is faster to compute",
                        "B": "To solve the crowding problem: heavy tails allow dissimilar points to be pushed farther apart in low dimensions",
                        "C": "The t-distribution matches the high-dimensional Gaussian exactly",
                        "D": "Gaussians cannot represent 2D data"
                    },
                    "correct": "B",
                    "explanation": "The crowding problem: low-dimensional space has less 'room' for moderate distances. Gaussian tails decay fast, squishing moderately distant points together. The t-distribution's heavy tails provide more space for dissimilar points, preserving cluster separation."
                },
                {
                    "id": 16,
                    "question": "A data scientist runs t-SNE twice on the same dataset and gets different-looking plots. Is this a bug?",
                    "options": {
                        "A": "Yes, correct algorithms always produce identical results",
                        "B": "No, t-SNE is stochastic (random initialization + gradient descent), so different runs yield different embeddings. Only cluster structure should be consistent.",
                        "C": "No, but only if the perplexity was changed between runs",
                        "D": "Yes, the implementation must be incorrect"
                    },
                    "correct": "B",
                    "explanation": "t-SNE uses random initialization and stochastic gradient descent, so exact positions differ between runs. However, the cluster structure (which groups of points are close) should remain consistent. Always run t-SNE multiple times and compare."
                },
                {
                    "id": 17,
                    "question": "Which limitation makes t-SNE unsuitable as a preprocessing step for classification, unlike PCA?",
                    "options": {
                        "A": "t-SNE is too fast",
                        "B": "t-SNE has no explicit mapping function; new data points cannot be projected without rerunning on the entire dataset",
                        "C": "t-SNE only works with labeled data",
                        "D": "t-SNE produces higher-dimensional output than input"
                    },
                    "correct": "B",
                    "explanation": "PCA learns a linear projection matrix $\\mathbf{W}$ that can transform any new point: $\\mathbf{z}_{\\text{new}} = \\mathbf{W}^\\top \\mathbf{x}_{\\text{new}}$. t-SNE has no such mapping -- adding one new point requires rerunning the $O(n^2)$ algorithm on all data."
                },
                {
                    "id": 18,
                    "question": "Comparing PCA and t-SNE: PCA is $O(p^2 n)$, deterministic, and preserves global variance. Which t-SNE properties make it complementary?",
                    "options": {
                        "A": "t-SNE is $O(n^2)$, stochastic, non-reversible, and excels at preserving local neighborhood structure",
                        "B": "t-SNE is faster than PCA and preserves global structure better",
                        "C": "t-SNE is identical to PCA but with a different name",
                        "D": "t-SNE is deterministic and reversible like PCA"
                    },
                    "correct": "A",
                    "explanation": "PCA for global structure, dimensionality reduction, and preprocessing. t-SNE for visualization and discovering local cluster structure. Common workflow: PCA first (reduce to 30-50 dims for speed), then t-SNE for 2D visualization."
                },
                {
                    "id": 19,
                    "question": "A risk analyst applies PCA to 20 credit risk features for 5,000 loan applications. The first 5 PCs explain 92% of variance. What are the practical benefits of using these 5 PCs instead of all 20 features?",
                    "options": {
                        "A": "No benefit; all 20 features should always be used",
                        "B": "Reduced noise (discarded PCs mostly capture noise), faster model training, reduced multicollinearity, and lower overfitting risk, with only 8% information loss",
                        "C": "The only benefit is visualization in 5D",
                        "D": "PCA increases the number of features, not reduces them"
                    },
                    "correct": "B",
                    "explanation": "Using 5 PCs instead of 20 features: (1) removes noise in the discarded 8%, (2) trains downstream models 4x faster, (3) eliminates multicollinearity (PCs are orthogonal), (4) reduces overfitting risk with fewer parameters. The trade-off is 8% information loss and reduced interpretability."
                },
                {
                    "id": 20,
                    "question": "UMAP is a newer alternative to t-SNE. What is its main advantage over t-SNE?",
                    "options": {
                        "A": "UMAP is faster ($O(n\\log n)$ vs $O(n^2)$), better preserves global structure, and supports embedding new points",
                        "B": "UMAP always produces better visualizations",
                        "C": "UMAP requires no hyperparameters",
                        "D": "UMAP is a linear method like PCA"
                    },
                    "correct": "A",
                    "explanation": "UMAP advantages: (1) $O(n\\log n)$ complexity (scalable to millions of points), (2) better global structure preservation through cross-entropy optimization, (3) supports transform() for new points. Both t-SNE and UMAP require hyperparameter tuning (perplexity vs. n_neighbors)."
                }
            ]
        };

        const state = {
            currentIndex: 0,
            answers: {},
            score: 0,
            displayedQuestions: [],
            pendingSlots: []
        };

        const questionsRow = document.getElementById('questionsRow');
        const progressBar = document.getElementById('progressBar');
        const progressBadge = document.getElementById('progressBadge');
        const scoreBadge = document.getElementById('scoreBadge');
        const resultsCard = document.getElementById('resultsCard');
        const nextBtn = document.getElementById('nextBtn');

        function initQuiz() {
            state.currentIndex = 0;
            state.answers = {};
            state.score = 0;
            state.displayedQuestions = [];
            state.pendingSlots = [];

            resultsCard.classList.remove('show');
            questionsRow.style.display = 'grid';
            nextBtn.classList.remove('show');

            // Show first 3 questions
            for (let i = 0; i < 3 && i < quizData.questions.length; i++) {
                state.displayedQuestions.push(i);
            }
            state.currentIndex = Math.min(3, quizData.questions.length);

            renderQuestions();
            updateStats();
        }

        function renderQuestions() {
            questionsRow.innerHTML = '';

            state.displayedQuestions.forEach((qIdx, slot) => {
                const q = quizData.questions[qIdx];
                const answered = state.answers[q.id] !== undefined;
                const isCorrect = answered && state.answers[q.id] === q.correct;
                const isIncorrect = answered && state.answers[q.id] !== q.correct;

                const card = document.createElement('div');
                card.className = 'question-card';
                if (isCorrect) card.classList.add('correct-card', 'answered');
                if (isIncorrect) card.classList.add('incorrect-card', 'answered');

                card.innerHTML = `
                    <div class="q-header">
                        <span class="q-number">Q${qIdx + 1}</span>
                        ${answered ? `<span class="q-status">${isCorrect ? '&#10004;' : '&#10008;'}</span>` : ''}
                    </div>
                    <div class="q-text">${q.question}</div>
                    <div class="options" data-qid="${q.id}" data-slot="${slot}">
                        ${['A','B','C','D'].map(letter => {
                            let optClass = 'option-btn';
                            if (answered) {
                                optClass += ' disabled';
                                if (letter === q.correct) optClass += ' correct';
                                else if (letter === state.answers[q.id]) optClass += ' incorrect';
                            }
                            return `
                                <button class="${optClass}" data-letter="${letter}" ${answered ? 'disabled' : ''}>
                                    <span class="option-letter">${letter}</span>
                                    <span class="option-text">${q.options[letter]}</span>
                                </button>
                            `;
                        }).join('')}
                    </div>
                    <div class="feedback ${answered ? 'show' : ''} ${isCorrect ? 'correct' : 'incorrect'}">
                        ${answered ? (isCorrect ? '&#10004; ' : `&#10008; Answer: ${q.correct}. `) + q.explanation : ''}
                    </div>
                `;

                // Add click handlers
                if (!answered) {
                    card.querySelectorAll('.option-btn').forEach(btn => {
                        btn.addEventListener('click', () => handleAnswer(qIdx, slot, btn.dataset.letter));
                    });
                }

                questionsRow.appendChild(card);
            });

            renderMath();
        }

        function handleAnswer(qIdx, slot, letter) {
            const q = quizData.questions[qIdx];
            state.answers[q.id] = letter;

            if (letter === q.correct) state.score++;

            // Track this slot as pending replacement
            if (!state.pendingSlots.includes(slot)) {
                state.pendingSlots.push(slot);
            }

            updateStats();
            renderQuestions();

            // Check if all questions answered
            const answered = Object.keys(state.answers).length;
            if (answered >= quizData.questions.length) {
                // Short delay then show results
                setTimeout(showResults, 800);
            } else if (state.currentIndex < quizData.questions.length && state.pendingSlots.length > 0) {
                // Show Next button if there are more questions and pending slots
                nextBtn.classList.add('show');
            }
        }

        function loadNextQuestions() {
            // Replace pending slots with new questions
            while (state.pendingSlots.length > 0 && state.currentIndex < quizData.questions.length) {
                const slot = state.pendingSlots.shift();
                state.displayedQuestions[slot] = state.currentIndex;
                state.currentIndex++;
            }

            // Hide Next button
            nextBtn.classList.remove('show');

            renderQuestions();

            // Check if quiz is complete (all displayed questions answered)
            const answered = Object.keys(state.answers).length;
            if (answered >= quizData.questions.length) {
                setTimeout(showResults, 500);
            }
        }

        function updateStats() {
            const answered = Object.keys(state.answers).length;
            const total = quizData.questions.length;

            progressBar.style.width = `${(answered / total) * 100}%`;
            progressBadge.textContent = `${answered}/${total}`;
            scoreBadge.textContent = `Score: ${state.score}`;
        }

        function showResults() {
            questionsRow.style.display = 'none';
            nextBtn.classList.remove('show');
            resultsCard.classList.add('show');

            const total = quizData.questions.length;
            const percentage = Math.round((state.score / total) * 100);

            document.getElementById('resultsScore').textContent = `${state.score}/${total}`;

            let grade, gradeClass, icon;
            if (percentage >= 90) { grade = 'Excellent! A'; gradeClass = 'grade-a'; icon = '&#127942;'; }
            else if (percentage >= 80) { grade = 'Great! B'; gradeClass = 'grade-b'; icon = '&#11088;'; }
            else if (percentage >= 70) { grade = 'Good! C'; gradeClass = 'grade-c'; icon = '&#128077;'; }
            else if (percentage >= 60) { grade = 'Pass - D'; gradeClass = 'grade-d'; icon = '&#128221;'; }
            else { grade = 'Keep practicing'; gradeClass = 'grade-f'; icon = '&#128218;'; }

            document.getElementById('resultsIcon').innerHTML = icon;
            const gradeEl = document.getElementById('resultsGrade');
            gradeEl.textContent = `${grade} (${percentage}%)`;
            gradeEl.className = `results-grade ${gradeClass}`;
        }

        function restartQuiz() {
            initQuiz();
        }

        function renderMath() {
            if (typeof renderMathInElement !== 'undefined') {
                const opts = {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                };
                // Render only quiz content elements — avoids cross-element
                // delimiter pairing when renderMathInElement scans document.body
                document.querySelectorAll('.q-text, .option-text, .feedback').forEach(el => {
                    renderMathInElement(el, opts);
                });
            }
        }

        function waitForKaTeX(callback, maxAttempts = 50) {
    let attempts = 0;
    function check() {
        if (typeof renderMathInElement !== 'undefined') {
            callback();
        } else if (attempts < maxAttempts) {
            attempts++;
            setTimeout(check, 50);
        }
    }
    check();
}

// Initialize with error handling
        try {
            initQuiz();
            waitForKaTeX(renderMath);
        } catch (e) {
            console.error('Quiz initialization error:', e);
            const container = document.getElementById('questionsRow') || document.querySelector('.main');
            if (container) {
                container.innerHTML =
                    '<div style="padding:2rem;text-align:center;color:#991b1b;">' +
                    '<h3>Quiz failed to load</h3><p>Error: ' + e.message + '</p>' +
                    '<p>Please refresh the page or try a different browser.</p></div>';
            }
        }
    </script>
</body>
</html>
